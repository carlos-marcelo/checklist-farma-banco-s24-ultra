server {
    listen 80;

    # Essencial para que o Nginx entregue arquivos .js com o Content-Type correto
    include /etc/nginx/mime.types;
    types {
        application/javascript js mjs;
    }

    # Habilita compressão GZIP para melhor performance nos arquivos estáticos
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Fallback para o index.html - Vital para o React Router (SPA) funcionar ao recarregar a página
        try_files $uri $uri/ /index.html;
    }

    # Configuração de cache no navegador para arquivos estáticos
    location ~* \.(?:manifest|appcache|html?|xml|json)$ {
        root /usr/share/nginx/html;
        expires -1;
    }

    # Cache para assets estáticos e, crucialmente, =404 se não existir (para não servir o index.html acidentalmente como .js)
    location ~* \.(?:ico|css|js|mjs|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        root /usr/share/nginx/html;
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}
